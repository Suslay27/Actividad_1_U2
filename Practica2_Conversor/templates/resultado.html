<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Conversión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="bg-animation"></div>

    <div class="glass-card" style="max-width: 600px;">
        <p style="color: var(--text-muted); font-weight: 500; font-size: 1.1rem;">
            {{ cant }} {{ desde }} equivalen a:
        </p>
        <div class="result-value">{{ res }} {{ a }}</div>

        <div class="meta-info">
            <p>Tipo de cambio: <strong>1 {{ desde }} = {{ tasa }} {{ a }}</strong></p>
            <p style="margin-top: 0.5rem;"><small>Última actualización: {{ fecha }}</small></p>
        </div>

        <hr>

        <h3 style="margin-bottom: 1rem;">Evolución (30 días)</h3>
        
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 2rem; color: var(--text-dark); background: rgba(255,255,255,0.7); border-radius: 8px; overflow: hidden; text-align: center;">
            <tr style="background: rgba(0,0,0,0.1);">
                <th style="padding: 10px;">Valor Medio</th>
                <th style="padding: 10px;">Variación Absoluta</th>
                <th style="padding: 10px;">Variación %</th>
            </tr>
            <tr>
                <td style="padding: 10px;">{{ media }}</td>
                <td style="padding: 10px; color: {% if var_abs|float > 0 %}#22c55e{% elif var_abs|float < 0 %}#ef4444{% else %}inherit{% endif %};">{{ var_abs }}</td>
                <td style="padding: 10px; color: {% if var_porc|float > 0 %}#22c55e{% elif var_porc|float < 0 %}#ef4444{% else %}inherit{% endif %};">{{ var_porc }}%</td>
            </tr>
        </table>

        <div class="chart-container">
            <img src="data:image/png;base64,{{ grafico }}" style="width: 100%; display: block;">
        </div>

        <a href="/" class="back-link">← Volver al conversor</a>
    </div>
</body>

</html>
