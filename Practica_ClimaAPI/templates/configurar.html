<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Clave</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .config-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 300px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        button {
            padding: 12px 30px;
            border-radius: 20px;
            border: none;
            background: #00f2fe;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: white; }
    </style>
</head>
<body>
    <div class="config-card">
        <h1>🔑 Configuración Inicial</h1>
        <p>No se encontró una API Key. Por favor, ingrésala para continuar:</p>
        <form action="/guardar_config" method="POST">
            <input type="text" name="api_key" placeholder="Pega tu OpenWeather Key aquí" required>
            <br>
            <button type="submit">GUARDAR LLAVE</button>
        </form>
        <p style="font-size: 12px; color: #888; margin-top: 20px;">La llave se guardará localmente en un archivo llamado <b>key.txt</b></p>
    </div>
</body>
</html>
